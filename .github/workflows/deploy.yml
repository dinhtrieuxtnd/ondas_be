name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "ondas_be/**"

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ondas-be
  DEPLOY_DIR: /opt/ondas-app

jobs:
  # ══════════════════════════════════════════════════════════
  #  JOB 1: Build & Test
  # ══════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        working-directory: ondas_be
        run: ./mvnw clean package -DskipTests -B --no-transfer-progress

      - name: Run tests
        working-directory: ondas_be
        run: ./mvnw test -B --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ondas_be/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ondas_be/target/*.jar
          retention-days: 1

  # ══════════════════════════════════════════════════════════
  #  JOB 2: Build & Push Docker Image
  #  Chỉ chạy khi push lên main (không chạy với PR)
  # ══════════════════════════════════════════════════════════
  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ondas_be/target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ondas_be
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  #  JOB 3: Deploy lên VPS
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push-image

    environment:
      name: production
      url: http://${{ vars.VPS_HOST }}:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ondas_be/docker-compose.prod.yml
          target: /tmp/ondas-deploy/
          strip_components: 1

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR=/opt/ondas-app

            # 1. Ghi file .env từ secret (nội dung được lưu toàn bộ trong secret)
            echo "${{ secrets.PROD_ENV_FILE }}" > ${DEPLOY_DIR}/.env
            chmod 600 ${DEPLOY_DIR}/.env

            # 2. Copy docker-compose vào deploy dir
            cp /tmp/ondas-deploy/docker-compose.prod.yml ${DEPLOY_DIR}/docker-compose.prod.yml

            # 3. Pull image mới nhất
            docker compose -f ${DEPLOY_DIR}/docker-compose.prod.yml \
              --env-file ${DEPLOY_DIR}/.env \
              pull ondas-be

            # 4. Restart chỉ ondas-be (không restart postgres và minio)
            docker compose -f ${DEPLOY_DIR}/docker-compose.prod.yml \
              --env-file ${DEPLOY_DIR}/.env \
              up -d --force-recreate --no-deps ondas-be

            # 5. Dọn dẹp image cũ
            docker image prune -f

            # 6. Kiểm tra container đang chạy
            echo "=== Container status ==="
            docker compose -f ${DEPLOY_DIR}/docker-compose.prod.yml ps

            # 7. Chờ app khởi động (tối đa 60s)
            echo "=== Waiting for app to start ==="
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "App is healthy!"
                break
              fi
              echo "Attempt $i/12 - waiting..."
              sleep 5
            done

            echo "Deploy completed successfully!"
