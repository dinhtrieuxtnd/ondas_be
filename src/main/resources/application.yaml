spring:
  application:
    name: ondas_be
  config:
    import: optional:file:.env[.properties]
---
# ── Profile: dev (chạy app trực tiếp trên máy, DB trong Docker) ──
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5433/${POSTGRES_DB:ondas_db}
    username: ${POSTGRES_USER:ondas_user}
    password: ${POSTGRES_PASSWORD:ondas_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-audio: ${MINIO_BUCKET_AUDIO:ondas-audio}
    bucket-image: ${MINIO_BUCKET_IMAGE:ondas-images}

jwt:
  secret: dev-only-secret-key-change-in-production
  expiration: 86400000 # access token: 1 ngày
  refresh-expiration: 604800000 # refresh token: 7 ngày
  password-reset-expiration: 60000 # reset token: 1 phút

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:noreply@ondas.app}
  google:
    client-id: ${GOOGLE_CLIENT_ID}

server:
  port: 8080

logging:
  level:
    com.example.ondas_be: DEBUG
    org.springframework.security: DEBUG
